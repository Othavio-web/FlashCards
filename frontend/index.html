<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards - CRUD</title>
  <link rel="stylesheet" href="Styles.css">
</head>
<body>
  <div class="container">
    <h1>📚 Flashcards</h1>
    <div id="feedback" class="feedback hidden"></div>
    
    <!-- 🔖 Seletor de Categoria -->
    <div class="category-selector">
      <label for="categoryFilter">Categoria:</label>
      <select id="categoryFilter">
        <option value="">Todas</option>
        <option value="JavaScript">JavaScript</option>
        <option value="React">React</option>
        <option value="Node.js">Node.js</option>
        <option value="HTML">HTML</option>
        <option value="CSS">CSS</option>
        <option value="TypeScript">TypeScript</option>
        <option value="Python">Python</option>
      </select>
    </div>

    <!-- 📖 Card Display -->
    <div class="card">
      <div class="inner" id="card">
        <div class="question" id="question">Clique em um card para começar</div>
        <div class="answer" id="answer">Carregando...</div>
      </div>
    </div>

    <!-- 🎮 Controles de Navegação -->
    <div class="controls">
      <button id="prevBtn" class="btn">⬅️ Anterior</button>
      <button id="nextBtn" class="btn">Próximo ➡️</button>
    </div>

    <!-- 🎴 Grade de Cards da Categoria -->
    <div class="grid-section">
      <h2>🎴 Cards da Categoria</h2>
      <div id="cardsGrid" class="cards-display-grid"></div>
    </div>

    <!-- ➕ Formulário para Adicionar Card -->
    <div class="form-section">
      <h2>➕ Adicionar Novo Card</h2>
      <form id="addCardForm">
        <select id="newCategory" required>
          <option value="">Escolha uma categoria</option>
          <option value="JavaScript">JavaScript</option>
          <option value="React">React</option>
          <option value="Node.js">Node.js</option>
          <option value="HTML">HTML</option>
          <option value="CSS">CSS</option>
          <option value="TypeScript">TypeScript</option>
          <option value="Python">Python</option>
        </select>
        <input 
          type="text" 
          id="newFront" 
          placeholder="Pergunta" 
          required
        >
        <textarea 
          id="newBack" 
          placeholder="Resposta" 
          required
        ></textarea>
        <button type="submit" class="btn-add">Adicionar Card</button>
      </form>
    </div>

    <!-- 📋 Lista de Cards (para editar/deletar) -->
    <div class="list-section">
      <h2>📋 Seus Cards</h2>
      <div id="cardsList" class="cards-grid"></div>
    </div>
  </div>

  <div id="editModal" class="modal-overlay hidden">
    <div class="modal">
      <h2>✏️ Editar Card</h2>
      <form id="editCardForm">
        <select id="editCategory" required>
          <option value="">Escolha uma categoria</option>
          <option value="JavaScript">JavaScript</option>
          <option value="React">React</option>
          <option value="Node.js">Node.js</option>
          <option value="HTML">HTML</option>
          <option value="CSS">CSS</option>
          <option value="TypeScript">TypeScript</option>
          <option value="Python">Python</option>
        </select>
        <input type="text" id="editFront" placeholder="Pergunta" required>
        <textarea id="editBack" placeholder="Resposta" required></textarea>
        <div class="modal-actions">
          <button type="submit" class="btn">Salvar alterações</button>
          <button type="button" class="btn btn-secondary" id="closeEditModal">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
</body>
</html>
